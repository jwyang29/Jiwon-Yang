<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Jiwon Yang — Portfolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Jacquarda+Bastarda+9&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #9ecedd;
      overflow-x: hidden;
      font-family: 'Courier New', Courier, monospace;
    }

    /* Canvas stays fixed; the page scrolls to pan the camera across the pool */
    #canvas { position: fixed; inset: 0; width: 100vw; height: 100vh; display: block; }

    /* Invisible spacer that gives the page its scrollable height */
    #scroll-space { height: 300vh; pointer-events: none; }

    /* ── Bounding box overlay ────────────────────────────── */
    #bbox {
      position: fixed;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.1s ease;
    }
    #bbox.visible { opacity: 1; }

    #bbox-border {
      position: absolute;
      inset: 0;
      border: 1.5px solid #FF6B9D;
      box-shadow: 0 0 18px rgba(255, 107, 157, 0.4),
                  inset 0 0 18px rgba(255, 107, 157, 0.06);
    }
    /* Corner brackets */
    #bbox-border::before {
      content: '';
      position: absolute;
      top: -3px; left: -3px;
      width: 11px; height: 11px;
      border-top: 2.5px solid #FF6B9D;
      border-left: 2.5px solid #FF6B9D;
    }
    #bbox-border::after {
      content: '';
      position: absolute;
      bottom: -3px; right: -3px;
      width: 11px; height: 11px;
      border-bottom: 2.5px solid #FF6B9D;
      border-right: 2.5px solid #FF6B9D;
    }

    #bbox-label {
      position: absolute;
      top: -24px; left: -1px;
      background: #FF6B9D;
      color: #fff;
      font: bold 10px/1 'Courier New', monospace;
      padding: 4px 9px;
      letter-spacing: 0.05em;
      white-space: nowrap;
    }
    #bbox-sub {
      position: absolute;
      bottom: -20px; left: 0;
      color: #FF6B9D;
      font: 9px/1 'Courier New', monospace;
      letter-spacing: 0.06em;
      white-space: nowrap;
      text-shadow: 0 1px 6px rgba(0,0,0,0.35);
    }

    /* ── UI chrome ──────────────────────────────────────── */
    #ui {
      position: fixed;
      inset: 0;
      pointer-events: none;
    }

    #name-tag {
      position: absolute;
      top: 22px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(10, 45, 60, 0.6);
      font-size: 11px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      white-space: nowrap;
    }

    #hint {
      position: absolute;
      bottom: 22px;
      width: 100%;
      text-align: center;
      color: rgba(255, 255, 255, 0.55);
      font-size: 9px;
      letter-spacing: 0.16em;
      transition: opacity 0.4s ease;
    }

    #mic-btn {
      position: absolute;
      top: 18px; right: 18px;
      pointer-events: all;
      background: rgba(255,255,255,0.22);
      border: 1px solid rgba(255,255,255,0.5);
      color: rgba(10, 45, 60, 0.75);
      font: 9px 'Courier New', monospace;
      letter-spacing: 0.1em;
      padding: 7px 14px;
      border-radius: 20px;
      cursor: pointer;
      transition: background 0.2s;
    }
    #mic-btn:hover,
    #mic-btn.active { background: rgba(255,255,255,0.4); }
    #mic-btn.active { color: #FF6B9D; border-color: #FF6B9D; }

    /* ── Floating name typography ───────────────────────── */
    /* Flexbox wrapper guarantees true centering on every aspect ratio;
       the animation only nudges translateY so it can't break alignment. */
    #name-wrap {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      z-index: 5;
    }

    @keyframes nameFloat {
      0%, 100% { transform: translateY(0px); }
      33%       { transform: translateY(-14px) rotate(-0.4deg); }
      66%       { transform: translateY(-6px)  rotate(0.3deg); }
    }

    #floating-name {
      font-family: 'Jacquarda Bastarda 9', serif;
      font-size: clamp(52px, 8.5vw, 128px);
      color: rgba(250, 172, 155, 0.92); /* light salmon pink */
      text-shadow:
        0 2px 24px rgba(250, 172, 155, 0.35),
        0 0px  6px rgba(255, 255, 255, 0.20);
      letter-spacing: -0.01em;
      white-space: nowrap;
      text-align: center;
      user-select: none;
      animation: nameFloat 7s ease-in-out infinite;
    }

    /* ── Mobile ─────────────────────────────────────────── */
    @media (max-width: 640px) {
      #floating-name {
        font-size: clamp(34px, 11vw, 52px);
        white-space: normal;
        max-width: 90vw;
      }
      #name-tag { top: calc(16px + env(safe-area-inset-top)); font-size: 10px; }
      #mic-btn  { top: calc(14px + env(safe-area-inset-top)); right: 14px; }
      #hint     { bottom: calc(16px + env(safe-area-inset-bottom)); font-size: 8px; }
    }
  </style>
  <script type="module" crossorigin src="/Jiwon-Yang/assets/index-G2ioHzxD.js"></script>
</head>
<body>
  <canvas id="canvas"></canvas>

  <!-- Bounding box HTML overlay -->
  <div id="bbox">
    <div id="bbox-border"></div>
    <div id="bbox-label"></div>
    <div id="bbox-sub"></div>
  </div>

  <!-- Large floating name (stays centered while scrolling) -->
  <div id="name-wrap">
    <div id="floating-name">Jiwon Yang</div>
  </div>

  <!-- UI chrome -->
  <div id="ui">
    <div id="name-tag">Portfolio</div>
    <button id="mic-btn">◎  MIC</button>
    <div id="hint">SCROLL DOWN TO SEE MORE  ↓</div>
  </div>

  <!-- Scrollable page height -->
  <div id="scroll-space"></div>

</body>
</html>
